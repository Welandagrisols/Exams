  <line x1="148" y1="58" x2="148" y2="86" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <!-- Tassel knot -->
  <circle cx="148" cy="90" r="5" fill="white"/>
  <!-- Bar chart bars (rising left to right) -->
  <rect x="44" y="122" width="20" height="32" rx="3" fill="white"/>
  <rect x="72" y="108" width="20" height="46" rx="3" fill="white"/>
  <rect x="100" y="94" width="20" height="60" rx="3" fill="white"/>
